<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>我的旅行地图</title>
  
  <!-- 高德地图 JS API v2.0 -->
  <script src="https://webapi.amap.com/maps?v=2.0&key=954aa34e28039ff97fadb652a5832b47&plugin=AMap.InfoWindow,AMap.ToolBar"></script>
  
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep:    #0a0e1a;
      --bg-card:    #111827;
      --bg-card2:   #1a2235;
      --border:     #1e2d45;
      --accent:     #f97316;
      --accent2:    #ef4444;
      --accent-glow:#f9731640;
      --text:       #e2e8f0;
      --text-muted: #64748b;
      --text-dim:   #94a3b8;
    }

    html, body {
      height: 100%;
      background: var(--bg-deep);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      overflow: hidden;
    }

    /* ===== Layout ===== */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ===== Header Stats ===== */
    #stats-bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 0;
      padding: 0 20px;
      height: 64px;
      background: linear-gradient(180deg, #0d1525 0%, #0a0e1a 100%);
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 10;
    }

    .stats-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--text);
      margin-right: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .stats-title .icon { font-size: 20px; }

    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 20px;
      border-left: 1px solid var(--border);
    }
    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.2;
      font-variant-numeric: tabular-nums;
    }
    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 1px;
      margin-top: 2px;
    }

    /* ===== Main Content ===== */
    #main {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    /* ===== Map ===== */
    #map-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #amap-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    /* 自定义 Marker 样式 */
    .city-marker {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
    }

    .marker-dot {
      width: 16px;
      height: 16px;
      background: var(--accent);
      border: 2px solid #fff;
      border-radius: 50%;
      box-shadow: 0 0 10px var(--accent-glow);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .marker-ring {
      position: absolute;
      width: 30px;
      height: 30px;
      border: 2px solid var(--accent);
      border-radius: 50%;
      opacity: 0.4;
      animation: pulse-ring 2.5s ease-out infinite;
      top: -7px;
    }

    .city-marker:hover .marker-dot {
      transform: scale(1.3);
      box-shadow: 0 0 16px var(--accent);
    }

    @keyframes pulse-ring {
      0%   { transform: scale(0.5); opacity: 0.6; }
      100% { transform: scale(1.5); opacity: 0; }
    }

    /* 起点城市样式 */
    .city-marker-home .marker-dot {
      background: #38bdf8;
      box-shadow: 0 0 10px #38bdf840;
    }
    .city-marker-home .marker-ring {
      border-color: #38bdf8;
    }

    /* ===== Side Panel ===== */
    #side-panel {
      width: 300px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: var(--bg-card);
      border-left: 1px solid var(--border);
      overflow: hidden;
    }

    .panel-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    #timeline {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    #timeline::-webkit-scrollbar { width: 4px; }
    #timeline::-webkit-scrollbar-track { background: transparent; }
    #timeline::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .trip-card {
      margin: 6px 10px;
      padding: 12px 14px;
      background: var(--bg-card2);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      position: relative;
    }
    .trip-card:hover {
      border-color: var(--accent);
      background: #1e2d45;
      transform: translateX(2px);
    }
    .trip-card.active {
      border-color: var(--accent);
      background: #1e2d45;
    }

    .trip-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }
    .trip-card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }
    .trip-card-date {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      margin-top: 2px;
    }

    .trip-card-route {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 6px;
    }
    .trip-card-route .arrow { color: var(--accent); font-size: 14px; }

    .trip-card-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
    }
    .tag-transport {
      background: #1e3a5f;
      color: #7dd3fc;
    }
    .tag-distance {
      background: #1a2e1a;
      color: #86efac;
    }

    .trip-card-note {
      margin-top: 8px;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
      border-top: 1px solid var(--border);
      padding-top: 8px;
    }

    /* ===== Modal ===== */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(4px);
    }
    #modal-overlay.open { display: flex; }

    #modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 480px;
      max-height: 80vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
      animation: modal-in 0.25s ease;
    }
    @keyframes modal-in {
      from { opacity: 0; transform: scale(0.92) translateY(16px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    #modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
    }
    #modal-city-name {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }
    #modal-city-count {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    #modal-close {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, color 0.2s;
    }
    #modal-close:hover { background: var(--border); color: var(--text); }

    #modal-body {
      overflow-y: auto;
      padding: 12px 16px 16px;
      flex: 1;
    }
    #modal-body::-webkit-scrollbar { width: 4px; }
    #modal-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .modal-trip-card {
      padding: 14px;
      background: var(--bg-card2);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 10px;
    }
    .modal-trip-card:last-child { margin-bottom: 0; }

    .modal-trip-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }
    .modal-trip-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 8px;
    }
    .modal-info-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .modal-info-label {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .modal-info-value {
      font-size: 13px;
      color: var(--text-dim);
      font-weight: 500;
    }
    .modal-trip-note {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.6;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }

    /* ===== Loading ===== */
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-deep);
      z-index: 20;
      flex-direction: column;
      gap: 16px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: var(--text-muted); font-size: 13px; letter-spacing: 1px; }

    /* ===== Responsive ===== */
    @media (max-width: 768px) {
      html, body { overflow: auto; }
      #app { height: auto; overflow: auto; }

      #stats-bar {
        height: auto;
        padding: 10px 12px;
        flex-wrap: wrap;
        gap: 8px;
      }
      .stats-title { width: 100%; margin-right: 0; font-size: 15px; }
      .stat-item { border-left: none; border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; flex: 1; min-width: 80px; }
      .stat-value { font-size: 18px; }

      #main { flex-direction: column; overflow: visible; }

      #map-container {
        height: 85vw;
        min-height: 320px;
        max-height: 560px;
      }

      #side-panel {
        width: 100%;
        border-left: none;
        border-top: 1px solid var(--border);
        max-height: 360px;
      }

      #timeline { max-height: 300px; }
    }

    @media (max-width: 480px) {
      #map-container { height: 85vw; min-height: 320px; max-height: 560px; }
      .stat-value { font-size: 16px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .pulse-ring, * { animation: none !important; }
    }

    /* 高德地图控件样式覆盖 */
    :root .amap-toolbar, 
    :root .amap-ctrl-content {
      display: none !important;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- Stats Bar -->
  <header id="stats-bar">
    <div class="stats-title">
      <span class="icon">🗺️</span>
      我的旅行地图
    </div>
    <div class="stat-item">
      <span class="stat-value" id="stat-cities">0</span>
      <span class="stat-label">去过城市</span>
    </div>
    <div class="stat-item">
      <span class="stat-value" id="stat-trips">0</span>
      <span class="stat-label">出行次数</span>
    </div>
    <div class="stat-item">
      <span class="stat-value" id="stat-distance">0</span>
      <span class="stat-label">总里程 km</span>
    </div>
  </header>

  <!-- Main -->
  <div id="main">

    <!-- Map -->
    <div id="map-container">
      <div id="loading">
        <div class="spinner"></div>
        <div class="loading-text">加载高德地图…</div>
      </div>
      <div id="amap-container"></div>
    </div>

    <!-- Side Panel -->
    <aside id="side-panel">
      <div class="panel-header">出行记录</div>
      <div id="timeline"></div>
    </aside>

  </div>
</div>

<!-- Modal -->
<div id="modal-overlay">
  <div id="modal">
    <div id="modal-header">
      <div>
        <div id="modal-city-name"></div>
        <div id="modal-city-count"></div>
      </div>
      <button id="modal-close">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ============================================================
//  Data & State
// ============================================================
let map = null;
let tripsData = [];
let cityMap = {};   // cityName -> { name, lng, lat, trips[] }
let markers = [];
let infoWindow = null;

const HOME_CITY = { name: "深圳", lng: 114.06, lat: 22.54 };

const transportIcon = {
  '飞机': '✈️', '高铁': '🚄', '火车': '🚂',
  '汽车': '🚗', '轮船': '🚢', '步行': '🚶', '其他': '🚌'
};

// ============================================================
//  Helpers
// ============================================================
function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDate(dateStr) {
  const d = new Date(dateStr);
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
}

// ============================================================
//  Stats
// ============================================================
function renderStats() {
  const cities = Object.keys(cityMap).length;
  const trips  = tripsData.length;
  const dist   = tripsData.reduce((s, t) => s + (t.distance || 0), 0);

  animateCount('stat-cities', cities);
  animateCount('stat-trips', trips);
  animateCount('stat-distance', dist);
}

function animateCount(id, target) {
  const el = document.getElementById(id);
  const duration = 800;
  const start = performance.now();
  function step(now) {
    const p = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - p, 3);
    el.textContent = Math.round(ease * target).toLocaleString();
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ============================================================
//  Map - 高德地图
// ============================================================
function initMap() {
  // 确保地图容器有高度
  const container = document.getElementById('map-container');
  const h = container.clientHeight;
  if (h === 0) {
    // 手机端 flex 布局可能还没撑开，延迟初始化
    setTimeout(initMap, 100);
    return;
  }

  // 创建地图实例
  map = new AMap.Map('amap-container', {
    center: [105, 36],  // 中国中心
    zoom: 5,           // 缩放级别
    viewMode: '2D',
    showIndoorMap: false,
    showBuildingBlock: false,
  });

  // 强制触发地图尺寸计算
  map.resize();

  // 地图加载完成后加载数据
  map.on('complete', () => {
    console.log('高德地图加载完成');
    loadTripsData();
  });
}

function loadTripsData() {
  document.getElementById('loading').querySelector('.loading-text').textContent = '加载出行数据…';
  
  fetch('trips.json')
    .then(res => {
      if (!res.ok) throw new Error('无法加载 trips.json');
      return res.json();
    })
    .then(data => {
      tripsData = data.trips.sort((a, b) => new Date(b.date) - new Date(a.date));
      
      // Build city map (destination cities)
      tripsData.forEach(t => {
        const key = t.to.name;
        if (!cityMap[key]) {
          cityMap[key] = { name: key, lng: t.to.lng, lat: t.to.lat, trips: [] };
        }
        cityMap[key].trips.push(t);
      });

      // 隐藏 loading
      document.getElementById('loading').style.display = 'none';
      
      // 渲染数据
      renderStats();
      renderMarkers();
      renderTimeline();
      renderRoutes();
    })
    .catch(err => {
      console.error('加载数据失败:', err);
      document.getElementById('loading').innerHTML =
        `<div style="color:#ef4444;text-align:center;padding:20px">
          <div style="font-size:32px;margin-bottom:12px">⚠️</div>
          <div>数据加载失败，请检查网络连接</div>
          <div style="font-size:12px;color:#64748b;margin-top:8px">${err.message}</div>
        </div>`;
    });
}

function renderMarkers() {
  // 计算最大访问次数
  const maxVisits = Math.max(...Object.values(cityMap).map(c => c.trips.length), 1);
  
  // 标记点大小范围
  const minSize = 12;
  const maxSize = 28;
  const sizeScale = (count) => {
    if (maxVisits <= 1) return minSize;
    return minSize + (maxSize - minSize) * (count - 1) / (maxVisits - 1);
  };

  // 创建信息窗体
  infoWindow = new AMap.InfoWindow({
    isCustom: false,
    autoMove: true,
    avoidBase: true,
    closeWhenClickMap: true,
    offset: new AMap.Pixel(0, -30)
  });

  // 绘制目的地城市标记
  Object.values(cityMap).forEach(city => {
    const size = sizeScale(city.trips.length);
    const marker = createMarker(city.lng, city.lat, size, city, false);
    markers.push(marker);
    marker.setMap(map);
  });

  // 绘制起点城市（深圳）- 固定大小
  const homeMarker = createMarker(HOME_CITY.lng, HOME_CITY.lat, 14, { name: HOME_CITY.name, trips: [] }, true);
  markers.push(homeMarker);
  homeMarker.setMap(map);
}

function createMarker(lng, lat, size, city, isHome) {
  // 创建自定义 DOM 标记
  const markerContent = document.createElement('div');
  markerContent.className = isHome ? 'city-marker city-marker-home' : 'city-marker';
  
  const markerDot = document.createElement('div');
  markerDot.className = 'marker-dot';
  markerDot.style.width = size + 'px';
  markerDot.style.height = size + 'px';
  
  markerContent.appendChild(markerDot);
  
  // 非起点城市添加脉冲环
  if (!isHome) {
    const markerRing = document.createElement('div');
    markerRing.className = 'marker-ring';
    markerContent.appendChild(markerRing);
  }

  // 创建 AMap.Marker
  const marker = new AMap.Marker({
    position: [lng, lat],
    content: markerContent,
    offset: new AMap.Pixel(-size/2, -size/2),
    zIndex: isHome ? 100 : city.trips.length
  });

  // 点击事件 - 打开信息窗体
  marker.on('click', () => {
    if (isHome) return;
    showInfoWindow(city);
  });

  // 鼠标悬停提示
  if (!isHome) {
    marker.on('mouseover', () => {
      marker.setzIndex(999);
    });
    marker.on('mouseout', () => {
      marker.setzIndex(city.trips.length);
    });
  }

  return marker;
}

function showInfoWindow(city) {
  const icon = transportIcon[city.trips[0].transport] || '🚌';
  
  let tripsHtml = city.trips.map(t => `
    <div style="padding: 10px 0; border-bottom: 1px solid #1e2d45;">
      <div style="font-size: 14px; font-weight: 600; margin-bottom: 4px;">${escapeHtml(t.title)}</div>
      <div style="font-size: 12px; color: #94a3b8;">
        ${escapeHtml(t.from.name)} → ${escapeHtml(t.to.name)} | ${icon} ${escapeHtml(t.transport)} | ${escapeHtml(t.distance.toLocaleString())} km
      </div>
      <div style="font-size: 12px; color: #64748b; margin-top: 4px;">${escapeHtml(formatDate(t.date))}</div>
      ${t.note ? `<div style="font-size: 12px; color: #64748b; margin-top: 4px;">💬 ${escapeHtml(t.note)}</div>` : ''}
    </div>
  `).join('');

  const content = `
    <div style="background: #111827; padding: 16px; max-width: 360px; color: #e2e8f0;">
      <div style="font-size: 18px; font-weight: 700; margin-bottom: 4px;">📍 ${escapeHtml(city.name)}</div>
      <div style="font-size: 13px; color: #64748b; margin-bottom: 12px;">共 ${city.trips.length} 次出行记录</div>
      <div>${tripsHtml}</div>
    </div>
  `;

  infoWindow.setContent(content);
  infoWindow.open(map, [city.lng, city.lat]);
}

function renderRoutes() {
  // 绘制出行路线（从深圳到各城市）
  tripsData.forEach(trip => {
    const line = new AMap.Polyline({
      path: [
        [trip.from.lng, trip.from.lat],
        [trip.to.lng, trip.to.lat]
      ],
      strokeColor: '#f97316',
      strokeWeight: 2,
      strokeOpacity: 0.4,
      strokeDasharray: [4, 3],
      strokeStyle: 'dashed',
      zIndex: 1
    });
    line.setMap(map);
  });
}

// ============================================================
//  Timeline
// ============================================================
function renderTimeline() {
  const container = document.getElementById('timeline');
  container.innerHTML = '';

  tripsData.forEach(trip => {
    const card = document.createElement('div');
    card.className = 'trip-card';
    card.dataset.id = trip.id;

    const icon = transportIcon[trip.transport] || '🚌';
    const dateStr = formatDate(trip.date);

    card.innerHTML = `
      <div class="trip-card-header">
        <div class="trip-card-title">${escapeHtml(trip.title)}</div>
        <div class="trip-card-date">${escapeHtml(dateStr)}</div>
      </div>
      <div class="trip-card-route">
        <span>${escapeHtml(trip.from.name)}</span>
        <span class="arrow">→</span>
        <span>${escapeHtml(trip.to.name)}</span>
      </div>
      <div class="trip-card-meta">
        <span class="tag tag-transport">${icon} ${escapeHtml(trip.transport)}</span>
        <span class="tag tag-distance">📍 ${escapeHtml(trip.distance.toLocaleString())} km</span>
      </div>
      ${trip.note ? `<div class="trip-card-note">${escapeHtml(trip.note)}</div>` : ''}
    `;

    card.addEventListener('click', () => {
      const city = cityMap[trip.to.name];
      if (city) {
        // 移动地图到该城市
        map.setCenter([city.lng, city.lat]);
        map.setZoom(8);
        showInfoWindow(city);
      }
    });

    container.appendChild(card);
  });
}

// ============================================================
//  Modal（备用，用于更详细的城市信息展示）
// ============================================================
function openModal(city, highlightId) {
  const overlay = document.getElementById('modal-overlay');
  document.getElementById('modal-city-name').textContent = `📍 ${city.name}`;
  document.getElementById('modal-city-count').textContent =
    `共 ${city.trips.length} 次出行记录`;

  const body = document.getElementById('modal-body');
  body.innerHTML = '';

  city.trips.forEach(trip => {
    const icon = transportIcon[trip.transport] || '🚌';
    const card = document.createElement('div');
    card.className = 'modal-trip-card';
    if (trip.id === highlightId) card.style.borderColor = 'var(--accent)';

    card.innerHTML = `
      <div class="modal-trip-title">${escapeHtml(trip.title)}</div>
      <div class="modal-trip-info">
        <div class="modal-info-item">
          <span class="modal-info-label">日期</span>
          <span class="modal-info-value">${escapeHtml(formatDate(trip.date))}</span>
        </div>
        <div class="modal-info-item">
          <span class="modal-info-label">交通</span>
          <span class="modal-info-value">${icon} ${escapeHtml(trip.transport)}</span>
        </div>
        <div class="modal-info-item">
          <span class="modal-info-label">出发地</span>
          <span class="modal-info-value">${escapeHtml(trip.from.name)}</span>
        </div>
        <div class="modal-info-item">
          <span class="modal-info-label">里程</span>
          <span class="modal-info-value">${escapeHtml(trip.distance.toLocaleString())} km</span>
        </div>
      </div>
      ${trip.note ? `<div class="modal-trip-note">💬 ${escapeHtml(trip.note)}</div>` : ''}
    `;
    body.appendChild(card);
  });

  overlay.classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ============================================================
//  Resize
// ============================================================
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (map) {
      map.resize();
    }
  }, 300);
});

// ============================================================
//  Init
// ============================================================
let initRetry = 0;
function init() {
  try {
    // 等待 AMap 全局对象可用
    if (typeof AMap === 'undefined') {
      if (++initRetry > 20) {
        document.getElementById('loading').innerHTML =
          '<div style="color:#ef4444;text-align:center;padding:20px"><div style="font-size:32px;margin-bottom:12px">⚠️</div><div>地图加载超时，请刷新页面</div></div>';
        return;
      }
      setTimeout(init, 100);
      return;
    }
    initRetry = 0;
    initMap();
  } catch (err) {
    console.error('初始化失败:', err);
    document.getElementById('loading').innerHTML =
      `<div style="color:#ef4444;text-align:center;padding:20px">
        <div style="font-size:32px;margin-bottom:12px">⚠️</div>
        <div>地图初始化失败</div>
        <div style="font-size:12px;color:#64748b;margin-top:8px">${err.message}</div>
      </div>`;
  }
}

// 页面加载完成后初始化
window.addEventListener('load', init);
</script>
</body>
</html>
