<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋 - AI对战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        h1 {
            color: white;
            font-size: 2em;
            margin-bottom: 15px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        
        .info-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            background: white;
            padding: 12px 25px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .player {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1em;
            font-weight: 600;
        }
        
        .player.active {
            color: #667eea;
        }
        
        .piece-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid #333;
        }
        
        .piece-icon.black {
            background: #333;
        }
        
        .piece-icon.white {
            background: white;
        }
        
        .mode-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .mode-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9em;
            transition: all 0.3s;
        }
        
        .mode-btn.active {
            background: #667eea;
            color: white;
        }
        
        .mode-btn.inactive {
            background: white;
            color: #667eea;
        }
        
        .main-area {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }
        
        .board-container {
            background: #deb887;
            padding: 12px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        
        .board {
            display: grid;
            grid-template-columns: repeat(15, 28px);
            grid-template-rows: repeat(15, 28px);
            background: 
                linear-gradient(#333 1px, transparent 1px),
                linear-gradient(90deg, #333 1px, transparent 1px);
            background-size: 28px 28px;
            background-position: -1px -1px;
            position: relative;
        }
        
        .cell {
            width: 28px;
            height: 28px;
            cursor: pointer;
            position: relative;
        }
        
        .cell:hover:not(.occupied) {
            background: rgba(102, 126, 234, 0.3);
        }
        
        .cell.occupied {
            cursor: default;
        }
        
        .piece {
            position: absolute;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            z-index: 1;
        }
        
        .piece.black {
            background: radial-gradient(circle at 30% 30%, #555, #111);
        }
        
        .piece.white {
            background: radial-gradient(circle at 30% 30%, #fff, #ddd);
            border: 1px solid #999;
        }
        
        .piece.last {
            box-shadow: 0 0 8px 2px #667eea, 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .piece.win {
            box-shadow: 0 0 15px 5px #ff6b6b, 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .log-panel {
            width: 280px;
            background: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            max-height: 450px;
            display: flex;
            flex-direction: column;
        }
        
        .log-title {
            font-size: 1.1em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        
        .log-content {
            flex: 1;
            overflow-y: auto;
            font-size: 0.85em;
            line-height: 1.6;
        }
        
        .log-entry {
            padding: 6px 0;
            border-bottom: 1px solid #f5f5f5;
        }
        
        .log-entry .step {
            color: #667eea;
            font-weight: 600;
        }
        
        .log-entry .player {
            color: #333;
            font-weight: 500;
        }
        
        .log-entry .coord {
            color: #666;
        }
        
        .log-entry .time {
            color: #999;
            font-size: 0.8em;
            margin-left: 10px;
        }
        
        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
        
        button {
            padding: 10px 20px;
            font-size: 0.95em;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: white;
            padding: 40px 50px;
            border-radius: 16px;
            text-align: center;
            animation: popIn 0.3s ease;
        }
        
        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        
        .modal h2 {
            font-size: 1.8em;
            margin-bottom: 15px;
            color: #667eea;
        }
        
        .modal p {
            font-size: 1.1em;
            color: #333;
            margin-bottom: 20px;
        }
        
        .tooltip {
            position: fixed;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            z-index: 50;
            animation: tooltipIn 0.2s ease;
        }
        
        @keyframes tooltipIn {
            from { transform: translateY(-10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .ai-thinking {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            font-size: 1.2em;
            font-weight: 600;
            color: #667eea;
            z-index: 50;
        }
        
        .ai-thinking.show {
            display: block;
        }
        
        @media (max-width: 800px) {
            .main-area {
                flex-direction: column;
                align-items: center;
            }
            
            .log-panel {
                width: 100%;
                max-width: 450px;
                max-height: 200px;
            }
            
            .board {
                grid-template-columns: repeat(15, 22px);
                grid-template-rows: repeat(15, 22px);
                background-size: 22px 22px;
            }
            
            .cell {
                width: 22px;
                height: 22px;
            }
            
            .piece {
                width: 18px;
                height: 18px;
            }
            
            .board-container {
                padding: 8px;
            }
            
            .info-bar {
                flex-direction: column;
                gap: 8px;
                align-items: center;
            }
            
            .mode-toggle {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <h1>🎮 五子棋 - AI对战</h1>
    
    <div class="mode-toggle">
        <button class="mode-btn active" id="btnPvP" onclick="setMode('PvP')">双人对战</button>
        <button class="mode-btn inactive" id="btnPvAI" onclick="setMode('PvAI')">人机对战</button>
    </div>
    
    <div class="info-bar">
        <div class="player active" id="playerBlack">
            <span class="piece-icon black"></span>
            <span id="blackName">黑棋</span>
        </div>
        <div class="player" id="playerWhite">
            <span class="piece-icon white"></span>
            <span id="whiteName">白棋</span>
        </div>
    </div>
    
    <div class="main-area">
        <div class="board-container">
            <div class="board" id="board"></div>
        </div>
        
        <div class="log-panel">
            <div class="log-title">📋 落子日志</div>
            <div class="log-content" id="logContent"></div>
        </div>
    </div>
    
    <div class="controls">
        <button class="btn-primary" onclick="resetGame()">重新开始</button>
    </div>
    
    <div class="tooltip" id="confirmTooltip">
        <div style="padding: 15px 20px;">
            <div id="tooltipMsg" style="margin-bottom: 12px; font-size: 0.95em;">确认落子？</div>
            <div style="display: flex; gap: 10px;">
                <button onclick="confirmPlace()" style="padding: 8px 16px; background: #667eea; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9em;">✓ 确认</button>
                <button onclick="cancelPlace()" style="padding: 8px 16px; background: #999; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9em;">✗ 取消</button>
            </div>
        </div>
    </div>
    
    <div class="modal" id="modal">
        <div class="modal-content">
            <h2 id="winnerText">🎉 黑棋获胜！</h2>
            <p>再来一局？</p>
            <button class="btn-primary" onclick="resetGame()">确定</button>
        </div>
    </div>
    
    <div class="ai-thinking" id="aiThinking">🤔 AI思考中...</div>
    
    <script>
        const BOARD_SIZE = 15;
        let board = [];
        let currentPlayer = 'black';
        let history = [];
        let gameOver = false;
        let mode = 'PvP';
        let pendingMove = null;
        let tooltipTimeout = null;
        
        const directions = [
            [0, 1], [1, 0], [1, 1], [1, -1]
        ];
        
        function initBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            
            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = row;
                    cell.dataset.col = col;
                    cell.onclick = (e) => handleClick(row, col, e);
                    cell.onmouseenter = (e) => showTooltipPreview(row, col, e);
                    cell.onmouseleave = hideTooltipPreview;
                    boardEl.appendChild(cell);
                }
            }
        }
        
        function showTooltipPreview(row, col, e) {
            if (gameOver || board[row][col]) return;
            if (mode === 'PvAI' && currentPlayer === 'white') return;
            
            const tooltip = document.getElementById('confirmTooltip');
            const msg = document.getElementById('tooltipMsg');
            const playerName = mode === 'PvAI' ? (currentPlayer === 'black' ? '你' : 'AI') : (currentPlayer === 'black' ? '黑棋' : '白棋');
            msg.textContent = `${playerName} → ${row + 1}行${col + 1}列`;
            
            // 定位到鼠标旁边
            const rect = e.target.getBoundingClientRect();
            tooltip.style.left = (rect.right + 10) + 'px';
            tooltip.style.top = (rect.top - 20) + 'px';
            tooltip.style.display = 'block';
            tooltip.dataset.row = row;
            tooltip.dataset.col = col;
            
            clearTimeout(tooltipTimeout);
            tooltipTimeout = setTimeout(() => {
                tooltip.style.display = 'none';
            }, 3000);
        }
        
        function hideTooltipPreview() {
            // 不自动隐藏，等待点击确认
        }
        
        function handleClick(row, col, e) {
            if (gameOver || board[row][col]) return;
            if (mode === 'PvAI' && currentPlayer === 'white') return;
            
            // 显示确认tooltip
            showTooltip(row, col, e);
        }
        
        function showTooltip(row, col, e) {
            const tooltip = document.getElementById('confirmTooltip');
            const msg = document.getElementById('tooltipMsg');
            const playerName = mode === 'PvAI' ? (currentPlayer === 'black' ? '你(黑)' : 'AI(白)') : (currentPlayer === 'black' ? '黑棋' : '白棋');
            msg.textContent = `${playerName} → ${row + 1}行${col + 1}列`;
            
            const rect = e.target.getBoundingClientRect();
            tooltip.style.left = (rect.right + 10) + 'px';
            tooltip.style.top = (rect.top - 20) + 'px';
            tooltip.style.display = 'block';
            tooltip.dataset.row = row;
            tooltip.dataset.col = col;
            
            clearTimeout(tooltipTimeout);
        }
        
        function confirmPlace() {
            const tooltip = document.getElementById('confirmTooltip');
            const row = parseInt(tooltip.dataset.row);
            const col = parseInt(tooltip.dataset.col);
            tooltip.style.display = 'none';
            
            placePiece(row, col);
            
            if (gameOver) return;
            
            if (mode === 'PvAI' && currentPlayer === 'white') {
                setTimeout(aiMove, 300);
            }
        }
        
        function cancelPlace() {
            document.getElementById('confirmTooltip').style.display = 'none';
        }
        
        function placePiece(row, col, isAI = false) {
            board[row][col] = currentPlayer;
            history.push({ row, col, player: currentPlayer });
            
            renderPiece(row, col);
            addLog(currentPlayer, row, col);
            
            if (checkWin(row, col)) {
                gameOver = true;
                showWinner(currentPlayer);
                highlightWin(row, col);
                return;
            }
            
            currentPlayer = currentPlayer === 'black' ? 'white' : 'black';
            updatePlayerIndicator();
        }
        
        function renderPiece(row, col, isWin = false) {
            const cell = document.querySelector(`.cell[data-row="${row}"][data-col="${col}"]`);
            cell.classList.add('occupied');
            
            const piece = document.createElement('div');
            piece.className = `piece ${board[row][col]}`;
            if (history.length > 0) piece.classList.add('last');
            if (isWin) piece.classList.add('win');
            cell.appendChild(piece);
            
            if (history.length > 1) {
                const lastMove = history[history.length - 2];
                const lastCell = document.querySelector(`.cell[data-row="${lastMove.row}"][data-col="${lastMove.col}"]`);
                const lastPiece = lastCell.querySelector('.piece');
                if (lastPiece) lastPiece.classList.remove('last');
            }
        }
        
        function addLog(player, row, col) {
            const logContent = document.getElementById('logContent');
            const step = history.length;
            const playerName = mode === 'PvAI' ? (player === 'black' ? '玩家' : 'AI') : (player === 'black' ? '黑棋' : '白棋');
            const coord = `${row + 1}行${col + 1}列`;
            const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="step">#${step}</span> <span class="player">${playerName}</span> <span class="coord">${coord}</span> <span class="time">${time}</span>`;
            
            logContent.insertBefore(entry, logContent.firstChild);
        }
        
        function updatePlayerIndicator() {
            document.getElementById('playerBlack').classList.toggle('active', currentPlayer === 'black');
            document.getElementById('playerWhite').classList.toggle('active', currentPlayer === 'white');
            
            const blackName = mode === 'PvAI' ? '玩家(黑)' : '黑棋';
            const whiteName = mode === 'PvAI' ? 'AI(白)' : '白棋';
            document.getElementById('blackName').textContent = blackName;
            document.getElementById('whiteName').textContent = whiteName;
        }
        
        function checkWin(row, col) {
            const player = board[row][col];
            
            for (const [dr, dc] of directions) {
                let count = 1;
                
                for (const [dir, sign] of [[1, 1], [1, -1]]) {
                    let r = row + dr * dir * sign;
                    let c = col + dc * dir * sign;
                    
                    while (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE && board[r][c] === player) {
                        count++;
                        r += dr * dir * sign;
                        c += dc * dir * sign;
                    }
                }
                
                if (count >= 5) return true;
            }
            
            return false;
        }
        
        function getWinPositions(row, col) {
            const player = board[row][col];
            
            for (const [dr, dc] of directions) {
                let line = [[row, col]];
                
                for (const [dir, sign] of [[1, 1], [1, -1]]) {
                    let r = row + dr * dir * sign;
                    let c = col + dc * dir * sign;
                    
                    while (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE && board[r][c] === player) {
                        line.push([r, c]);
                        r += dr * dir * sign;
                        c += dc * dir * sign;
                    }
                }
                
                if (line.length >= 5) {
                    return line.slice(0, 5);
                }
            }
            
            return null;
        }
        
        function highlightWin(row, col) {
            const positions = getWinPositions(row, col);
            if (!positions) return;
            
            for (const [r, c] of positions) {
                const cell = document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);
                const piece = cell.querySelector('.piece');
                if (piece) piece.classList.add('win');
            }
        }
        
        function showWinner(winner) {
            const winnerText = document.getElementById('winnerText');
            const winnerName = mode === 'PvAI' ? (winner === 'black' ? '🎉 你获胜！' : '🤖 AI获胜！') : (winner === 'black' ? '🎉 黑棋获胜！' : '🎉 白棋获胜！');
            winnerText.textContent = winnerName;
            document.getElementById('modal').classList.add('show');
        }
        
        function setMode(newMode) {
            mode = newMode;
            document.getElementById('btnPvP').className = mode === 'PvP' ? 'mode-btn active' : 'mode-btn inactive';
            document.getElementById('btnPvAI').className = mode === 'PvAI' ? 'mode-btn active' : 'mode-btn inactive';
            resetGame();
        }
        
        function aiMove() {
            if (gameOver) return;
            
            document.getElementById('aiThinking').classList.add('show');
            
            setTimeout(() => {
                const move = findBestMove();
                placePiece(move.row, move.col, true);
                document.getElementById('aiThinking').classList.remove('show');
            }, 500);
        }
        
        function findBestMove() {
            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    if (!board[row][col]) {
                        board[row][col] = 'white';
                        if (checkWin(row, col)) {
                            board[row][col] = null;
                            return { row, col };
                        }
                        board[row][col] = null;
                    }
                }
            }
            
            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    if (!board[row][col]) {
                        board[row][col] = 'black';
                        if (checkWin(row, col)) {
                            board[row][col] = null;
                            return { row, col };
                        }
                        board[row][col] = null;
                    }
                }
            }
            
            let bestScore = -Infinity;
            let bestMove = { row: 7, col: 7 };
            
            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    if (!board[row][col]) {
                        const score = evaluatePosition(row, col);
                        if (score > bestScore) {
                            bestScore = score;
                            bestMove = { row, col };
                        }
                    }
                }
            }
            
            return bestMove;
        }
        
        function evaluatePosition(row, col) {
            let score = 0;
            
            const centerDist = Math.max(Math.abs(row - 7), Math.abs(col - 7));
            score += (7 - centerDist) * 2;
            
            for (const [dr, dc] of directions) {
                score += evaluateDirection(row, col, dr, dc, 'white') * 1.5;
                score += evaluateDirection(row, col, dr, dc, 'black');
            }
            
            return score;
        }
        
        function evaluateDirection(row, col, dr, dc, player) {
            let count = 0;
            let open = 0;
            
            let r = row + dr;
            let c = col + dc;
            let consecutive = 0;
            let blocked = false;
            
            while (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE) {
                if (board[r][c] === player) {
                    consecutive++;
                } else if (board[r][c]) {
                    blocked = true;
                    break;
                } else {
                    open++;
                    break;
                }
                r += dr;
                c += dc;
            }
            
            if (!blocked && consecutive > 0) open++;
            count += consecutive;
            
            r = row - dr;
            c = col - dc;
            consecutive = 0;
            blocked = false;
            
            while (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE) {
                if (board[r][c] === player) {
                    consecutive++;
                } else if (board[r][c]) {
                    blocked = true;
                    break;
                } else {
                    open++;
                    break;
                }
                r -= dr;
                c -= dc;
            }
            
            if (!blocked && consecutive > 0) open++;
            count += consecutive;
            
            if (count >= 4) return 10000;
            if (count === 3 && open >= 1) return 1000;
            if (count === 3 && open === 0) return 100;
            if (count === 2 && open >= 2) return 100;
            if (count === 2 && open === 1) return 10;
            if (count === 1) return 1;
            
            return 0;
        }
        
        function resetGame() {
            board = Array(BOARD_SIZE).fill(null).map(() => Array(BOARD_SIZE).fill(null));
            currentPlayer = 'black';
            history = [];
            gameOver = false;
            
            document.getElementById('modal').classList.remove('show');
            document.getElementById('confirmTooltip').style.display = 'none';
            document.getElementById('logContent').innerHTML = '';
            updatePlayerIndicator();
            initBoard();
        }
        
        resetGame();
    </script>
</body>
</html>
