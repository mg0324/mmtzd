<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>存钱记录 - 账单</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .bill-header {
            background: white;
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border-top: 4px solid #1f2937;
        }
        
        .bill-title {
            font-size: 2em;
            font-weight: bold;
            color: #1f2937;
            margin-bottom: 10px;
        }
        
        .bill-period {
            font-size: 0.95em;
            color: #666;
            margin-bottom: 20px;
        }
        
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
        }
        
        .summary-item {
            border-left: 3px solid #3b82f6;
            padding-left: 15px;
        }
        
        .summary-label {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 5px;
            font-weight: 500;
        }
        
        .summary-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #1f2937;
        }
        
        .summary-value.income {
            color: #10b981;
        }
        
        .summary-value.expense {
            color: #ef4444;
        }
        
        .controls {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }
        
        .control-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .control-group label {
            font-weight: 500;
            color: #333;
            font-size: 0.9em;
        }
        
        select, input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.9em;
            font-family: inherit;
        }
        
        select:focus, input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        button {
            padding: 8px 16px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9em;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #2563eb;
        }
        
        .charts-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .chart-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .chart-title {
            font-size: 1.1em;
            font-weight: bold;
            color: #1f2937;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e5e7eb;
        }
        
        canvas {
            max-width: 100%;
            height: auto;
            display: block;
        }
        
        .table-section {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            overflow-x: auto;
        }
        
        .table-title {
            font-size: 1.1em;
            font-weight: bold;
            color: #1f2937;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e5e7eb;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background: #f9fafb;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #374151;
            border-bottom: 2px solid #e5e7eb;
            cursor: pointer;
            user-select: none;
            font-size: 0.9em;
        }
        
        th:hover {
            background: #f3f4f6;
        }
        
        td {
            padding: 12px;
            border-bottom: 1px solid #f3f4f6;
            color: #4b5563;
            font-size: 0.9em;
        }
        
        tr:hover {
            background: #f9fafb;
        }
        
        .date-cell {
            font-weight: 500;
            color: #1f2937;
        }
        
        .amount-cell {
            font-weight: 600;
            text-align: right;
        }
        
        .amount-cell.income {
            color: #10b981;
        }
        
        .amount-cell.expense {
            color: #ef4444;
        }
        
        .year-badge {
            display: inline-block;
            padding: 4px 8px;
            background: #f0f0f0;
            border-radius: 3px;
            font-size: 0.8em;
            font-weight: 500;
            color: #666;
        }
        
        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        @media (max-width: 1024px) {
            .charts-section {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 768px) {
            .bill-header {
                padding: 20px;
            }
            
            .bill-title {
                font-size: 1.5em;
            }
            
            .summary-grid {
                grid-template-columns: 1fr;
            }
            
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            
            .control-group {
                flex-direction: column;
            }
            
            select, input, button {
                width: 100%;
            }
            
            table {
                font-size: 0.85em;
            }
            
            th, td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="bill-header">
            <div class="bill-title">💳 存钱账单</div>
            <div class="bill-period">统计周期：2023年12月 ~ 2026年3月</div>
            
            <div class="summary-grid">
                <div class="summary-item">
                    <div class="summary-label">起始余额</div>
                    <div class="summary-value" id="initialBalance">¥111,000</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">总存入</div>
                    <div class="summary-value income" id="totalIncome">¥0</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">总支出</div>
                    <div class="summary-value expense" id="totalExpense">¥0</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">当前余额</div>
                    <div class="summary-value" id="currentBalance">¥0</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">净增加</div>
                    <div class="summary-value income" id="netIncrease">¥0</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">交易笔数</div>
                    <div class="summary-value" id="recordCount">0笔</div>
                </div>
            </div>
        </div>
        
        <div class="controls">
            <div class="control-group">
                <label>年份：</label>
                <select id="yearFilter">
                    <option value="">全部</option>
                    <option value="2023">2023年</option>
                    <option value="2024">2024年</option>
                    <option value="2025">2025年</option>
                    <option value="2026">2026年</option>
                </select>
            </div>
            <div class="control-group">
                <label>类型：</label>
                <select id="typeFilter">
                    <option value="">全部</option>
                    <option value="income">存入</option>
                    <option value="expense">支出</option>
                </select>
            </div>
            <div class="control-group">
                <label>搜索：</label>
                <input type="text" id="searchInput" placeholder="输入关键词...">
            </div>
            <button onclick="resetFilters()">重置</button>
        </div>
        
        <div class="charts-section">
            <div class="chart-card">
                <div class="chart-title">📈 余额走势</div>
                <canvas id="balanceChart" width="500" height="300"></canvas>
            </div>
            
            <div class="chart-card">
                <div class="chart-title">📊 收支明细</div>
                <canvas id="amountChart" width="500" height="300"></canvas>
            </div>
        </div>
        
        <div class="table-section">
            <div class="table-title">📋 交易明细</div>
            <table id="dataTable">
                <thead>
                    <tr>
                        <th onclick="sortTable(0)">日期 ↕</th>
                        <th onclick="sortTable(1)">年份</th>
                        <th onclick="sortTable(2)">说明</th>
                        <th onclick="sortTable(3)">金额 ↕</th>
                        <th onclick="sortTable(4)">余额 ↕</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>
    </div>
    
    <script>
        let data = [];
        
        // 从 JSON 文件加载数据
        fetch('data.json')
            .then(response => response.json())
            .then(jsonData => {
                data = jsonData.records;
                filteredData = [...data];
                updateStats();
                renderTable();
                drawCharts();
            })
            .catch(error => console.error('加载数据失败:', error));
        
        let filteredData = [];
        let sortColumn = -1;
        let sortAsc = true;
        
        function updateStats() {
            if (data.length === 0) return;
            
            const initialBalance = 111000;
            const totalIncome = data.filter(r => r.amount > 0).reduce((sum, r) => sum + r.amount, 0);
            const totalExpense = Math.abs(data.filter(r => r.amount < 0).reduce((sum, r) => sum + r.amount, 0));
            const currentBalance = data[data.length - 1].balance;
            const netIncrease = currentBalance - initialBalance;
            const recordCount = data.length;
            
            document.getElementById('initialBalance').textContent = '¥' + initialBalance.toLocaleString();
            document.getElementById('totalIncome').textContent = '¥' + totalIncome.toLocaleString();
            document.getElementById('totalExpense').textContent = '¥' + totalExpense.toLocaleString();
            document.getElementById('currentBalance').textContent = '¥' + currentBalance.toLocaleString();
            document.getElementById('netIncrease').textContent = '¥' + netIncrease.toLocaleString();
            document.getElementById('recordCount').textContent = recordCount + '笔';
        }
        
        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            if (filteredData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="no-data">没有匹配的数据</td></tr>';
                return;
            }
            
            filteredData.forEach(row => {
                const tr = document.createElement('tr');
                const amountClass = row.amount > 0 ? 'income' : 'expense';
                tr.innerHTML = `
                    <td class="date-cell">${row.date}</td>
                    <td><span class="year-badge">${row.year}</span></td>
                    <td>${row.desc}</td>
                    <td class="amount-cell ${amountClass}">¥${Math.abs(row.amount).toLocaleString()}</td>
                    <td class="amount-cell">¥${row.balance.toLocaleString()}</td>
                `;
                tbody.appendChild(tr);
            });
        }
        
        function applyFilters() {
            const year = document.getElementById('yearFilter').value;
            const type = document.getElementById('typeFilter').value;
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            filteredData = data.filter(row => {
                const yearMatch = !year || row.year === year;
                const typeMatch = !type || (type === 'income' && row.amount > 0) || (type === 'expense' && row.amount < 0);
                const searchMatch = !search || row.desc.toLowerCase().includes(search);
                return yearMatch && typeMatch && searchMatch;
            });
            
            renderTable();
            drawCharts();
        }
        
        function resetFilters() {
            document.getElementById('yearFilter').value = '';
            document.getElementById('typeFilter').value = '';
            document.getElementById('searchInput').value = '';
            applyFilters();
        }
        
        function sortTable(col) {
            if (sortColumn === col) {
                sortAsc = !sortAsc;
            } else {
                sortColumn = col;
                sortAsc = true;
            }
            
            filteredData.sort((a, b) => {
                let aVal, bVal;
                if (col === 0) { aVal = a.date; bVal = b.date; }
                else if (col === 1) { aVal = a.year; bVal = b.year; }
                else if (col === 2) { aVal = a.desc; bVal = b.desc; }
                else if (col === 3) { aVal = a.amount; bVal = b.amount; }
                else if (col === 4) { aVal = a.balance; bVal = b.balance; }
                
                if (typeof aVal === 'string') {
                    return sortAsc ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
                }
                return sortAsc ? aVal - bVal : bVal - aVal;
            });
            
            renderTable();
        }
        
        function drawCharts() {
            drawBalanceChart();
            drawAmountChart();
        }
        
        function drawBalanceChart() {
            const canvas = document.getElementById('balanceChart');
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;
            
            ctx.clearRect(0, 0, width, height);
            
            if (filteredData.length === 0) return;
            
            const padding = 50;
            const graphWidth = width - padding * 2;
            const graphHeight = height - padding * 2;
            
            const balances = filteredData.map(d => d.balance);
            const minBalance = Math.min(...balances);
            const maxBalance = Math.max(...balances);
            const range = maxBalance - minBalance || 1;
            
            // 绘制背景网格
            ctx.strokeStyle = '#e5e7eb';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 5; i++) {
                const y = padding + (graphHeight / 5) * i;
                ctx.beginPath();
                ctx.moveTo(padding, y);
                ctx.lineTo(width - padding, y);
                ctx.stroke();
            }
            
            // 绘制坐标轴
            ctx.strokeStyle = '#1f2937';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(padding, height - padding);
            ctx.lineTo(width - padding, height - padding);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(padding, padding);
            ctx.lineTo(padding, height - padding);
            ctx.stroke();
            
            // 绘制Y轴标签
            ctx.fillStyle = '#666';
            ctx.font = '12px sans-serif';
            ctx.textAlign = 'right';
            for (let i = 0; i <= 5; i++) {
                const y = height - padding - (graphHeight / 5) * i;
                const value = minBalance + (range / 5) * i;
                ctx.fillText('¥' + Math.round(value / 1000) + 'k', padding - 10, y + 4);
            }
            
            // 绘制X轴日期标签
            ctx.textAlign = 'center';
            ctx.fillStyle = '#666';
            const step = Math.ceil(filteredData.length / 8);
            for (let i = 0; i < filteredData.length; i += step) {
                const x = padding + (graphWidth / (filteredData.length - 1 || 1)) * i;
                const date = filteredData[i].date.substring(5);
                ctx.fillText(date, x, height - padding + 20);
            }
            
            // 绘制折线
            ctx.strokeStyle = '#3b82f6';
            ctx.lineWidth = 2;
            ctx.beginPath();
            
            for (let i = 0; i < filteredData.length; i++) {
                const x = padding + (graphWidth / (filteredData.length - 1 || 1)) * i;
                const y = height - padding - ((filteredData[i].balance - minBalance) / range) * graphHeight;
                
                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }
            ctx.stroke();
            
            // 绘制数据点
            ctx.fillStyle = '#3b82f6';
            for (let i = 0; i < filteredData.length; i++) {
                const x = padding + (graphWidth / (filteredData.length - 1 || 1)) * i;
                const y = height - padding - ((filteredData[i].balance - minBalance) / range) * graphHeight;
                
                ctx.beginPath();
                ctx.arc(x, y, 4, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        function drawAmountChart() {
            const canvas = document.getElementById('amountChart');
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;
            
            ctx.clearRect(0, 0, width, height);
            
            if (filteredData.length === 0) return;
            
            const padding = 50;
            const graphWidth = width - padding * 2;
            const graphHeight = height - padding * 2;
            
            const amounts = filteredData.map(d => d.amount);
            const maxAmount = Math.max(...amounts.map(a => Math.abs(a)));
            
            // 绘制背景网格
            ctx.strokeStyle = '#e5e7eb';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 5; i++) {
                const y = padding + (graphHeight / 5) * i;
                ctx.beginPath();
                ctx.moveTo(padding, y);
                ctx.lineTo(width - padding, y);
                ctx.stroke();
            }
            
            // 绘制坐标轴
            ctx.strokeStyle = '#1f2937';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(padding, height - padding);
            ctx.lineTo(width - padding, height - padding);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(padding, padding);
            ctx.lineTo(padding, height - padding);
            ctx.stroke();
            
            // 绘制Y轴标签
            ctx.fillStyle = '#666';
            ctx.font = '12px sans-serif';
            ctx.textAlign = 'right';
            for (let i = 0; i <= 5; i++) {
                const y = height - padding - (graphHeight / 5) * i;
                const value = (maxAmount / 5) * i;
                ctx.fillText('¥' + Math.round(value / 1000) + 'k', padding - 10, y + 4);
            }
            
            // 绘制X轴日期标签
            ctx.textAlign = 'center';
            ctx.fillStyle = '#666';
            const step = Math.ceil(filteredData.length / 8);
            for (let i = 0; i < filteredData.length; i += step) {
                const x = padding + (graphWidth / filteredData.length) * i + (graphWidth / filteredData.length) / 2;
                const date = filteredData[i].date.substring(5);
                ctx.fillText(date, x, height - padding + 20);
            }
            
            // 绘制柱状图
            const barWidth = Math.max(2, graphWidth / (filteredData.length * 1.5));
            const centerLine = height - padding;
            
            for (let i = 0; i < filteredData.length; i++) {
                const x = padding + (graphWidth / filteredData.length) * i + (graphWidth / filteredData.length - barWidth) / 2;
                const amount = filteredData[i].amount;
                const barHeight = (Math.abs(amount) / maxAmount) * graphHeight;
                
                if (amount > 0) {
                    ctx.fillStyle = '#10b981';
                    ctx.fillRect(x, centerLine - barHeight, barWidth, barHeight);
                } else {
                    ctx.fillStyle = '#ef4444';
                    ctx.fillRect(x, centerLine, barWidth, barHeight);
                }
            }
        }
        
        // 初始化
        document.getElementById('yearFilter').addEventListener('change', applyFilters);
        document.getElementById('typeFilter').addEventListener('change', applyFilters);
        document.getElementById('searchInput').addEventListener('input', applyFilters);
        
        renderTable();
        drawCharts();
    </script>
</body>
</html>
